<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Docente - Actividad Módulo 2</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .student-card {
            border-left: 5px solid #bdc3c7;
        }

        .student-card.active {
            border-left-color: #2ecc71;
        }

        .controls-panel {
            background-color: #ecf0f1;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
    </style>
</head>

<body>
    <div class="container" style="max-width: 1400px;">
        <header class="app-header">
            <h2>Panel de Control - Docente</h2>
            <div class="user-info">
                <span id="teacherEmailDisplay">Profesor(a)</span>
                <button id="logoutBtn" class="btn btn-danger">Cerrar Sesión</button>
            </div>
        </header>

        <main>
            <!-- Panel de Control Principal -->
            <div class="controls-panel">
                <h3>Controles de la Actividad:</h3>
                <label for="activeMomentSelect">Momento Habilitado Actualmente:</label>
                <select id="activeMomentSelect" style="padding: 10px; font-size: 1rem; border-radius: 4px;">
                    <option value="0">0 - Actividad en Pausa (Nadie avanza)</option>
                    <option value="1">Momento 1 - Dudas del Tema</option>
                    <option value="2">Momento 2 - Preguntas de Comprensión</option>
                    <option value="3">Momento 3 - Análisis Epidemiológico</option>
                    <option value="4">Momento 4 - Calificación y Cierre</option>
                </select>
            </div>

            <!-- Dashboard de Estudiantes -->
            <h2>Progreso de los Estudiantes</h2>
            <div id="studentsDashboard" class="dashboard-grid">
                <!-- Las tarjetas de los estudiantes se inyectarán aquí -->
                <p>Esperando conexión de estudiantes...</p>
            </div>
        </main>
    </div>

    <!-- Firebase SDKs -->
    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/monitor.js"></script>
</body>

</html>
